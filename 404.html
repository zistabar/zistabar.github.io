<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>404 - Not Found</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Geist:wght@100..900&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#F0F4FF",
                        "primary": "#2D3E50",
                        "on-surface": "#2D3E50",
                        "on-surface-variant": "#4A5568",
                        "secondary-container": "#E0E4F5",
                        "on-secondary-container": "#6B7280",
                        "outline-variant": "#CBD5E1",
                        "surface-variant": "#F8FAFC",
                        "footer-bg": "#EBF1FF",
                        "dark": {
                            "background": "#0F172A",
                            "primary": "#F8FAFC",
                            "on-surface": "#F1F5F9",
                            "on-surface-variant": "#94A3B8",
                            "secondary-container": "#1E293B",
                            "on-secondary-container": "#94A3B8",
                            "outline-variant": "#334155",
                            "footer-bg": "#0B1120"
                        }
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Instrument Sans", "sans-serif"],
                        "body": ["Instrument Sans", "sans-serif"],
                        "label": ["Geist", "monospace"]
                    }
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            .material-symbols-outlined {
                font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
                display: inline-block;
                vertical-align: middle;
                line-height: 1;
            }
            .material-symbols-outlined.fill-1 {
                font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            }
            body {
                @apply bg-background text-on-surface transition-colors duration-500;
                font-family: 'Instrument Sans', sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
            .editorial-flow {
                max-width: 680px;
            }
        }
        @layer utilities {
            .dark body {
                @apply bg-dark-background text-dark-on-surface;
            }
            .dark .text-primary {
                @apply text-dark-primary;
            }
            .dark .text-on-surface-variant {
                @apply text-dark-on-surface-variant;
            }
            .dark .bg-outline-variant\/30 {
                @apply bg-dark-outline-variant/30;
            }
            .dark footer {
                @apply bg-dark-footer-bg/50;
            }
            .dark .text-on-secondary-container {
                @apply text-dark-on-secondary-container;
            }
        }
    </style>
    <script>
            (function () {
                var stored = localStorage.getItem('color-theme');
                var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                var useDark = stored === 'dark' || (stored === null && prefersDark);
                if (useDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            })();
    </script>
</head>

<body class="selection:bg-primary selection:text-white">
    <div class="fixed top-8 right-8 z-50">
        <button type="button" aria-label="Toggle dark mode" aria-pressed="false"
            class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/5 transition-colors group" id="theme-toggle">
            <span class="material-symbols-outlined fill-1 text-primary block dark:hidden text-[20px]"
                id="theme-toggle-light-icon">dark_mode</span>
            <span class="material-symbols-outlined text-primary hidden dark:block text-[20px]"
                id="theme-toggle-dark-icon">light_mode</span>
        </button>
    </div>
    <main class="min-h-screen flex flex-col justify-center px-6 py-24 md:py-32">
        <div class="editorial-flow mx-auto w-full">
            <header class="mb-12">
                <h1 class="text-6xl md:text-8xl font-semibold tracking-tighter text-primary leading-[0.9] mb-8">
                    404<br />Not Found
                </h1>
            </header>
            <section class="mb-16">
                <p class="text-xl md:text-2xl leading-[1.6] text-on-surface-variant font-medium tracking-tight">
                    The page you are looking for doesn't exist or has been moved.
                </p>
            </section>
            <section>
                <div class="flex flex-col gap-6">
                    <div class="h-[1px] w-full bg-outline-variant/30"></div>
                    <nav class="flex flex-wrap items-center gap-x-12 gap-y-6">
                        <a class="group flex items-center gap-2 text-primary font-semibold transition-all duration-300"
                            href="/">
                            <span
                                class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
                            <span class="font-label text-xs tracking-widest uppercase">Go back home</span>
                        </a>
                    </nav>
                </div>
            </section>
        </div>
    </main>
    <footer class="w-full py-12 bg-footer-bg/50">
        <div class="max-w-[680px] mx-auto flex flex-col items-center gap-4 text-center">
            <p class="font-label text-xs tracking-widest uppercase text-on-secondary-container">
                © 2026 <span
                    class="mx-3 inline-block w-1 h-1 bg-on-secondary-container rounded-full opacity-50 align-middle"></span>
                Warsaw, Poland
            </p>
        </div>
    </footer>
    <script>
        (function () {
            var docHtml = document.documentElement;
            var themeToggleBtn = document.getElementById('theme-toggle');

            function syncAriaPressed() {
                if (themeToggleBtn) {
                    themeToggleBtn.setAttribute('aria-pressed', docHtml.classList.contains('dark') ? 'true' : 'false');
                }
            }

            function applyThemeFromStorage() {
                var stored = localStorage.getItem('color-theme');
                var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                var useDark = stored === 'dark' || (stored === null && prefersDark);
                if (useDark) {
                    docHtml.classList.add('dark');
                } else {
                    docHtml.classList.remove('dark');
                }
                syncAriaPressed();
            }

            syncAriaPressed();

            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', function () {
                    if (docHtml.classList.contains('dark')) {
                        docHtml.classList.remove('dark');
                        localStorage.setItem('color-theme', 'light');
                    } else {
                        docHtml.classList.add('dark');
                        localStorage.setItem('color-theme', 'dark');
                    }
                    syncAriaPressed();
                });
            }

            // Sync theme when returning via "Back" button (bfcache)
            window.addEventListener('pageshow', function (e) {
                if (e.persisted) {
                    applyThemeFromStorage();
                }
            });

            // Sync theme when it changes in a different tab
            window.addEventListener('storage', function (e) {
                if (e.key === 'color-theme') {
                    applyThemeFromStorage();
                }
            });
        })();
    </script>
</body>

</html>
